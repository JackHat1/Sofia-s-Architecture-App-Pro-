        // 1. ΑΣΤΡΑΠΙΑΙΑ ΦΟΡΤΩΣΗ: Διαβάζει πρώτα από τη μνήμη του κινητού
        let buildings = JSON.parse(localStorage.getItem('sofia_app_data_pro')) || [...rawData];
        
        const map = L.map('map').setView([37.9780, 23.7320], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
        let routeLayer = null;

        // 2. ΥΒΡΙΔΙΚΗ ΑΠΟΘΗΚΕΥΣΗ (Τοπικά + Cloud ταυτόχρονα!)
        window.saveData = async function() {
            // Σώζει ΑΣΤΡΑΠΙΑΙΑ στο κινητό (δεν χάνεται στο refresh)
            localStorage.setItem('sofia_app_data_pro', JSON.stringify(buildings));

            // Σώζει ΣΤΟ ΣΥΝΝΕΦΟ (Firebase) αθόρυβα στο παρασκήνιο
            try {
                await setDoc(doc(db, "ArchitectureApp", "sofias_data"), { buildings: buildings });
            } catch (e) {
                console.error("Εκτός σύνδεσης: Θα συγχρονιστεί αργότερα.", e);
            }
        };

        // 3. ΣΥΓΧΡΟΝΙΣΜΟΣ ΜΕ ΤΟ FIREBASE ΣΤΗΝ ΑΡΧΗ
        async function loadFromFirebase() {
            try {
                const docRef = doc(db, "ArchitectureApp", "sofias_data");
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    const savedData = docSnap.data().buildings;
                    buildings = buildings.map(b => {
                        let saved = savedData.find(s => s.id === b.id);
                        return saved ? { ...b, ...saved } : b;
                    });
                    localStorage.setItem('sofia_app_data_pro', JSON.stringify(buildings));
                }
                window.renderApp();
            } catch (e) {
                console.log("Φορτώνω μόνο τοπικά.", e);
            }
        }

        window.uploadPhoto = async function(index, file) {
            if (!file) return;
            document.getElementById('loading-overlay').style.display = 'flex';
            document.getElementById('loading-text').innerText = 'Συμπίεση και αποθήκευση φωτογραφίας...';

            try {
                const reader = new FileReader();
                
                reader.onload = async function(event) {
                    try {
                        const img = new Image();
                        img.onload = async function() {
                            const maxWidth = 800;
                            const maxHeight = 800;
                            let width = img.width;
                            let height = img.height;

                            if (width > height) {
                                if (width > maxWidth) {
                                    height *= maxWidth / width;
                                    width = maxWidth;
                                }
                            } else {
                                if (height > maxHeight) {
                                    width *= maxHeight / height;
                                    height = maxHeight;
                                }
                            }

                            const canvas = document.createElement('canvas');
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);

                            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);

                            if (!buildings[index].user_photos) buildings[index].user_photos = [];
                            buildings[index].user_photos.push(compressedBase64);

                            await window.saveData();
                            
                            document.getElementById('loading-overlay').style.display = 'none';
                            window.renderApp();
                            
                            // Scroll to show new photo
                            setTimeout(() => {
                                const galleryContainers = document.querySelectorAll('.gallery-container');
                                if (galleryContainers[index]) {
                                    galleryContainers[index].scrollLeft = galleryContainers[index].scrollWidth;
                                }
                            }, 100);
                        };
                        img.src = event.target.result;
                    } catch (error) {
                        console.error("Σφάλμα συμπίεσης:", error);
                        document.getElementById('loading-overlay').style.display = 'none';
                        alert("❌ Σφάλμα κατά τη συμπίεση της φωτογραφίας!");
                    }
                };

                reader.onerror = function() {
                    document.getElementById('loading-overlay').style.display = 'none';
                    alert("❌ Σφάλμα διάβασμας του αρχείου!");
                };

                reader.readAsDataURL(file);

            } catch (error) {
                console.error("Σφάλμα Ανεβάσματος:", error);
                document.getElementById('loading-overlay').style.display = 'none';
                alert("❌ Αποτυχία ανεβάσματος!\nΑιτία: " + error.message);
            }
        };

        window.removePhoto = async function(buildingIndex, photoIndex) {
            if (confirm('Σίγουρα θέλεις να διαγράψεις αυτή τη φωτογραφία;')) {
                buildings[buildingIndex].user_photos.splice(photoIndex, 1);
                await window.saveData();
                renderApp();
            }
        };

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; const dLat = (lat2-lat1) * Math.PI / 180; const dLon = (lon2-lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        window.calculateSmartRoute = function() {
            let unvisited = buildings.filter(b => !b.visited);
            if(unvisited.length === 0) { alert("Τα έχεις δει όλα! Συγχαρητήρια!"); return; }

            document.getElementById('loading-overlay').style.display = 'flex';
            document.getElementById('loading-text').innerText = 'Εύρεση τοποθεσίας GPS...';

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        document.getElementById('loading-overlay').style.display = 'none';
                        generateRoute(pos.coords.latitude, pos.coords.longitude, unvisited);
                    },
                    (err) => {
                        document.getElementById('loading-overlay').style.display = 'none';
                        alert("Δεν δόθηκε άδεια GPS. Ξεκινάμε από το Σύνταγμα!");
                        generateRoute(37.9753, 23.7361, unvisited);
                    },
                    { enableHighAccuracy: true }
                );
            } else {
                generateRoute(37.9753, 23.7361, unvisited);
            }
        };

        function generateRoute(startLat, startLng, unvisited) {
            let route = []; let currentLat = startLat, currentLng = startLng; let remaining = [...unvisited];

            while(remaining.length > 0) {
                let nearestIdx = 0; let minDistance = Infinity;
                for(let i=0; i<remaining.length; i++) {
                    let d = getDistance(currentLat, currentLng, remaining[i].lat, remaining[i].lng);
                    if(d < minDistance) { minDistance = d; nearestIdx = i; }
                }
                let nextPoint = remaining[nearestIdx];
                route.push(nextPoint);
                currentLat = nextPoint.lat; currentLng = nextPoint.lng;
                remaining.splice(nearestIdx, 1);
            }

            if(routeLayer) map.removeLayer(routeLayer);
            
            let latlngs = route.map(p => [p.lat, p.lng]);
            latlngs.unshift([startLat, startLng]);

            routeLayer = L.polyline(latlngs, {color: 'var(--route-color)', weight: 5, dashArray: '10, 10', opacity: 0.9}).addTo(map);
            L.marker([startLat, startLng]).addTo(map).bindPopup("<b>📍 Βρίσκεσαι Εδώ!</b>").openPopup();
            map.fitBounds(routeLayer.getBounds(), {padding: [30, 30]});

            renderApp(route);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.renderApp = function(buildingsToShow = buildings) {
            const listContainer = document.getElementById('buildings-list');
            listContainer.innerHTML = '';
            
            map.eachLayer((layer) => { if (layer instanceof L.Marker) layer.remove(); });
            buildingMarkers = {}; // Reset markers

            let visitedCount = buildings.filter(b => b.visited).length;
            document.getElementById('progress-bar').innerText = `Πρόοδος: ${visitedCount} από ${buildings.length} 🎯`;

            buildingsToShow.forEach((b) => {
                let originalIndex = buildings.findIndex(orig => orig.id === b.id);
                let markerIcon = b.visited ? '🟢' : '📍';
                let marker = L.marker([b.lat, b.lng]).addTo(map).bindPopup(`<b>${markerIcon} ${b.title}</b>`);
                buildingMarkers[b.id] = marker; // Store marker reference

                let photosArray = b.user_photos ? [...b.user_photos] : [];
                let galleryHTML = `<div class="gallery-container">`;
                galleryHTML += `<img src="${b.photo_url}" class="gallery-img" onerror="this.style.display='none'">`;
                photosArray.forEach((imgUrl, photoIdx) => {
                    galleryHTML += `
                        <div class="gallery-wrapper">
                            <img src="${imgUrl}" class="gallery-img">
                            <button class="photo-delete-btn" onclick="window.removePhoto(${originalIndex}, ${photoIdx})">✕</button>
                        </div>
                    `;
                });
                galleryHTML += `</div>`;
                
                let hintHTML = (photosArray.length > 0) ? `<div class="gallery-hint">↔️ Σύρε αριστερά/δεξιά για φωτογραφίες</div>` : ``;

                const card = document.createElement('div');
                card.className = `building-card ${b.visited ? 'visited' : ''}`;
                card.innerHTML = `
                    ${galleryHTML}
                    ${hintHTML}
                    <div class="building-title">${b.title}</div>
                    <div class="info-row"><span>📍</span> ${b.address || '-'}</div>
                    <div class="info-row"><span>👨‍🎨</span> ${b.architect || '-'}</div>
                    <div class="info-row"><span>🛠️</span> ${b.type || '-'}</div>
                    
                    <button class="btn ${b.visited ? 'btn-visited-yes' : 'btn-visited-no'}" onclick="window.toggleVisited(${originalIndex})">
                        ${b.visited ? '✅ Το επισκέφτηκα' : '⭕ Σημείωσε ότι το επισκέφτηκα'}
                    </button>

                    <button class="btn btn-edit" onclick="window.toggleEdit(${originalIndex})">📝 Σημειώσεις & Φωτό</button>

                    <div class="edit-section" id="edit-${originalIndex}">
                        <div style="font-size:0.85rem; color:var(--text-muted); margin-bottom:14px; line-height:1.7; background:#fff; padding:12px; border-radius:10px; border-left:3px solid var(--primary);">
                            <b>📚 Ιστορικό/Ανάλυση:</b><br>
                            <div id="history-${originalIndex}"></div>
                        </div>
                        
                        <hr>
                        
                        <label style="display:block; margin-bottom:12px; font-weight:700; color:var(--text-main); font-size:0.95rem;">✍️ Οι δικές σου εντυπώσεις:</label>
                        <textarea id="notes-${originalIndex}" placeholder="Γράψε ό,τι θέλεις να θυμάσαι...">${b.notes || ''}</textarea>
                        <button class="btn btn-save" onclick="window.saveNotes(${originalIndex})">💾 Αποθήκευση</button>
                        
                        <hr>
                        
                        <label class="btn btn-camera" style="cursor:pointer; margin-top:0;">
                            📸 Πρόσθεσε Φωτογραφία
                            <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="window.uploadPhoto(${originalIndex}, this.files[0])">
                        </label>
                    </div>
                `;
                listContainer.appendChild(card);
                
                // Set history HTML after card is added
                const historyDiv = document.getElementById(`history-${originalIndex}`);
                if (historyDiv) historyDiv.innerHTML = b.history || '-';
            });
        }

        window.toggleVisited = function(i) { 
            buildings[i].visited = !buildings[i].visited; 
            window.saveData();
            window.renderApp(); 
        };

        window.toggleEdit = function(i) { 
            const el = document.getElementById(`edit-${i}`); 
            el.style.display = el.style.display === 'block' ? 'none' : 'block'; 
        };
        
        window.saveNotes = function(i) { 
            buildings[i].notes = document.getElementById(`notes-${i}`).value; 
            window.saveData();
            alert("✅ Οι σημειώσεις αποθηκεύτηκαν!");
        };

        // ΕΚΚΙΝΗΣΗ!
        window.renderApp(); // 1. Ζωγραφίζει αμέσως τα τοπικά δεδομένα χωρίς καθυστέρηση
        loadFromFirebase(); // 2. Ψάχνει στο background αν υπάρχουν νεότερα από άλλη συσκευή
    </script>
</body>
</html>
